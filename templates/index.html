<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classificador de E-mails IA</title>
    <style>
        :root {
            --primary-green: #07b458;
            --hover-green: #069d4d;
            --bg-gray: #f3f4f6;
            --text-dark: #1f2937;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg-gray);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            color: var(--text-dark);
        }

        .container {
            width: 100%;
            max-width: 768px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .banner {
            width: 100%;
            display: block;
            border-bottom: 1px solid #e5e7eb;
        }

        .content {
            padding: 30px;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 24px;
        }

        label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            margin-bottom: 8px;
        }

        textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            box-sizing: border-box;
            font-family: inherit;
            resize: vertical;
            outline: none;
        }

        textarea:focus {
            border-color: var(--primary-green);
            box-shadow: 0 0 0 2px rgba(7, 180, 88, 0.2);
        }

        /* Área de Upload */
        .upload-area {
            margin: 20px 0;
            border: 2px dashed #d1d5db;
            border-radius: 8px;
            background: #f9fafb;
            text-align: center;
            padding: 30px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .upload-area:hover {
            background: #f3f4f6;
        }

        .upload-area span {
            color: var(--primary-green);
            font-weight: 600;
        }

        /* Botões */
        .btn-group {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .btn {
            padding: 12px 24px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            transition: 0.2s;
        }

        .btn-primary {
            flex: 2;
            background: var(--primary-green);
            color: white;
        }

        .btn-primary:hover { background: var(--hover-green); }
        .btn-primary:disabled { background: #9ca3af; cursor: not-allowed; }

        .btn-secondary {
            flex: 1;
            background: #e5e7eb;
            color: #4b5563;
        }

        .btn-secondary:hover { background: #d1d5db; }

        /* Resultados */
        .resultado-container {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #e5e7eb;
        }

        .hidden { display: none; }

        .card-status {
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #e5e7eb;
        }

        .status-produtivo { background: #ecfdf5; border-color: #6ee7b7; }
        .status-improdutivo { background: #fef2f2; border-color: #fca5a5; }

        .sugestao-box {
            margin-top: 15px;
            background: rgba(255,255,255,0.5);
            padding: 10px;
            border-radius: 4px;
            font-style: italic;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="banner1.png" class="banner">

        <div class="content">
            <h1>Triagem de E-mails</h1>

            <label>Cole o texto do e-mail:</label>
            <textarea id="texto-email" rows="6" placeholder="Insira o conteúdo aqui..."></textarea>

            <div class="upload-area" onclick="document.getElementById('file-input').click()">
                <p><span>Clique para anexar documento</span><br>ou arraste um PDF/TXT</p>
                <input type="file" id="file-input" style="display:none" accept=".pdf,.txt">
            </div>
            <p id="file-info" style="color: var(--primary-green); font-weight: bold; display: none; font-size: 0.8rem;"></p>

            <div class="btn-group">
                <button onclick="processarConteudo()" id="btn-enviar" class="btn btn-primary">Analisar E-mail</button>
                <button onclick="limparAnalise()" id="btn-limpar" class="btn btn-secondary">Limpar</button>
            </div>

            <div id="resultado-container" class="resultado-container hidden">
                <h2 style="border-left: 4px solid var(--primary-green); padding-left: 10px; font-size: 1.2rem;">Resultado</h2>
                <div id="card-status" class="card-status">
                    <p><strong>Categoria:</strong> <span id="res-categoria"></span></p>
                    <p><strong>Justificativa:</strong> <span id="res-justificativa"></span></p>
                    <div class="sugestao-box">
                        <strong>Sugestão de Resposta:</strong><br>
                        <span id="res-sugerida"></span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
       
        async function processarConteudo() {
            const btn = document.getElementById('btn-enviar');
            const textoArea = document.getElementById('texto-email');
            const fileInput = document.getElementById('file-input');
            const arquivo = fileInput.files[0];

            if (!textoArea.value && !arquivo) {
                alert("Por favor, digite um texto ou selecione um arquivo.");
                return;
            }

            btn.disabled = true;
            btn.innerText = "Processando com IA...";

            const formData = new FormData();
            if (arquivo) formData.append('arquivo', arquivo);
            else formData.append('texto', textoArea.value);

            try {
                const response = await fetch('/processar', { method: 'POST', body: formData });
                const data = await response.json();
                if (response.ok) exibirResultado(data);
                else alert("Erro: " + (data.error || "Erro desconhecido"));
            } catch (error) {
                alert("Erro ao conectar com o servidor.");
            } finally {
                btn.disabled = false;
                btn.innerText = "Analisar E-mail";
            }
        }

        function exibirResultado(data) {
            document.getElementById('resultado-container').classList.remove('hidden');
            document.getElementById('res-categoria').innerText = data.categoria;
            document.getElementById('res-justificativa').innerText = data.justificativa;
            document.getElementById('res-sugerida').innerText = data.resposta_sugerida;

            const card = document.getElementById('card-status');
            card.className = "card-status " + (data.categoria === 'Produtivo' ? 'status-produtivo' : 'status-improdutivo');
        }

        function limparAnalise() {
            document.getElementById('texto-email').value = "";
            document.getElementById('file-input').value = "";
            document.getElementById('file-info').style.display = "none";
            document.getElementById('resultado-container').classList.add('hidden');
        }

        document.getElementById('file-input').addEventListener('change', function() {
            const info = document.getElementById('file-info');
            if (this.files[0]) {
                info.innerText = "Arquivo: " + this.files[0].name;
                info.style.display = "block";
            }
        });
    </script>
</body>
</html>
