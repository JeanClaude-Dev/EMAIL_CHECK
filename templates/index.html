<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classificador de E-mails IA</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen p-4 md:p-10">

    <div class="max-w-3xl mx-auto bg-white shadow-xl rounded-lg overflow-hidden">
        
        <div class="w-full"> 
            <img src="../banner.png" alt="Banner Análise de E-mails" class="w-full h-auto object-cover border-b border-gray-200">
        </div>

        <div class="p-6 md:p-8">
            <h1 class="text-2xl font-bold text-gray-800 mb-6">Triagem de E-mails</h1>

            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Cole o texto do e-mail:</label>
                    <textarea id="texto-email" rows="6" class="mt-1 block w-full border-gray-300 rounded-md shadow-sm border p-2 focus:ring-green-500 focus:border-green-500 outline-none" placeholder="Insira o conteúdo aqui..."></textarea>
                </div>

                <div class="flex items-center justify-center w-full">
                    <label class="flex flex-col items-center justify-center w-full h-32 border-2 border-gray-300 border-dashed rounded-lg cursor-pointer bg-gray-50 hover:bg-gray-100 transition-colors">
                        <div class="flex flex-col items-center justify-center pt-5 pb-6">
                            <p class="mb-2 text-sm text-gray-500 text-center px-4">
                                <span class="font-semibold text-green-600">Clique para anexar documento</span><br>ou arraste um PDF/TXT
                            </p>
                        </div>
                        <input type="file" id="file-input" class="hidden" accept=".pdf,.txt" />
                    </label>
                </div>
                <p id="file-info" class="text-sm text-green-600 font-semibold hidden"></p>

                <div class="flex gap-4">
                    <button onclick="processarConteudo()" id="btn-enviar" class="flex-1 bg-[#07b458] text-white font-bold py-3 rounded-md hover:bg-green-700 transition-all shadow-md">
                        Analisar E-mail
                    </button>
                    <button onclick="limparAnalise()" id="btn-limpar" class="px-6 bg-gray-200 text-gray-700 font-bold py-3 rounded-md hover:bg-gray-300 transition-all">
                        Limpar
                    </button>
                </div>
            </div>

            <div id="resultado-container" class="mt-8 hidden border-t pt-6">
                <h2 class="text-xl font-semibold mb-4 text-gray-800 border-l-4 border-[#07b458] pl-3">Resultado da Análise</h2>
                <div id="card-status" class="p-5 rounded-lg border shadow-sm">
                    <p class="text-lg"><strong>Categoria:</strong> <span id="res-categoria"></span></p>
                    <p class="mt-3 text-gray-700 text-sm md:text-base leading-relaxed"><strong>Justificativa:</strong> <span id="res-justificativa"></span></p>
                    
                    <div class="mt-5 p-4 bg-gray-50 border border-gray-200 rounded-md">
                        <p class="text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">Sugestão de Resposta:</p>
                        <p id="res-sugerida" class="text-gray-800 italic leading-relaxed"></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ... (Mantive suas funções originais de processarConteudo, exibirResultado e limparAnalise)
        async function processarConteudo() {
            const btn = document.getElementById('btn-enviar');
            const textoArea = document.getElementById('texto-email');
            const fileInput = document.getElementById('file-input');
            const textoManual = textoArea.value;
            const arquivo = fileInput.files[0];

            if (!textoManual && !arquivo) {
                alert("Por favor, digite um texto ou selecione um arquivo.");
                return;
            }

            btn.disabled = true;
            btn.innerText = "Processando com IA...";

            const formData = new FormData();
            if (arquivo) {
                formData.append('arquivo', arquivo);
            } else {
                formData.append('texto', textoManual);
            }

            try {
                const response = await fetch('/processar', { method: 'POST', body: formData });
                const data = await response.json();
                if (response.ok) { exibirResultado(data); } 
                else { alert("Erro: " + (data.error || "Erro desconhecido")); }
            } catch (error) {
                console.error(error);
                alert("Erro ao conectar com o servidor.");
            } finally {
                btn.disabled = false;
                btn.innerText = "Analisar E-mail";
            }
        }

        function exibirResultado(data) {
            document.getElementById('resultado-container').classList.remove('hidden');
            document.getElementById('res-categoria').innerText = data.categoria;
            document.getElementById('res-justificativa').innerText = data.justificativa;
            document.getElementById('res-sugerida').innerText = data.resposta_sugerida;

            const card = document.getElementById('card-status');
            if (data.categoria === 'Produtivo') {
                card.className = "p-5 rounded-lg border border-green-300 bg-green-50";
            } else {
                card.className = "p-5 rounded-lg border border-red-300 bg-red-50";
            }
        }

        function limparAnalise() {
            document.getElementById('texto-email').value = "";
            document.getElementById('file-input').value = "";
            document.getElementById('file-info').classList.add('hidden');
            document.getElementById('resultado-container').classList.add('hidden');
            document.getElementById('btn-enviar').disabled = false;
            document.getElementById('btn-enviar').innerText = "Analisar E-mail";
        }

        document.getElementById('file-input').addEventListener('change', function() {
            const info = document.getElementById('file-info');
            if (this.files[0]) {
                info.innerText = "Arquivo selecionado: " + this.files[0].name;
                info.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
