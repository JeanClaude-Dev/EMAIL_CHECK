<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Email Classifier</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen font-sans">
    <div class="max-w-4xl mx-auto py-12 px-4">
        <header class="text-center mb-12">
            <h1 class="text-4xl font-bold text-slate-800 mb-2">Classificador de Emails IA 🚀</h1>
            <p class="text-slate-600">Automatize sua triagem com inteligência artificial.</p>
        </header>

        <div class="bg-white rounded-xl shadow-lg p-8 mb-8">
            <label class="block text-sm font-semibold text-slate-700 mb-2">Cole o conteúdo do email ou arraste um arquivo .txt:</label>
            <textarea id="emailInput" rows="6" class="w-full p-4 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition" placeholder="Ex: Olá, gostaria de saber o status do meu pedido #123..."></textarea>
            
            <button onclick="processarEmail()" id="btnEnviar" class="mt-4 w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition shadow-md">
                Classificar Email
            </button>
        </div>

        <div id="resultado" class="hidden space-y-4">
            <div class="bg-white border-l-4 border-blue-500 p-6 rounded-lg shadow-md">
                <h3 class="text-lg font-bold text-slate-800">Categoria: <span id="resCategoria" class="text-blue-600 uppercase"></span></h3>
                <p id="resJustificativa" class="text-slate-600 italic mt-1"></p>
            </div>
            
            <div class="bg-slate-800 text-white p-6 rounded-lg shadow-md">
                <h3 class="text-sm uppercase tracking-wider font-semibold text-slate-400 mb-2">Sugestão de Resposta:</h3>
                <p id="resSugestao" class="leading-relaxed"></p>
            </div>
        </div>
    </div>

    <script>
        async function processarEmail() {
            const texto = document.getElementById('emailInput').value;
            const btn = document.getElementById('btnEnviar');
            if(!texto) return alert("Por favor, insira um texto.");

            btn.innerText = "Processando...";
            btn.disabled = true;

            try {
                const response = await fetch('/processar', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ texto })
                });
                const data = await response.json();
                
                document.getElementById('resCategoria').innerText = data.categoria;
                document.getElementById('resJustificativa').innerText = data.justificativa;
                document.getElementById('resSugestao').innerText = data.resposta_sugerida;
                document.getElementById('resultado').classList.remove('hidden');
            } catch (e) {
                alert("Erro ao processar. Verifique sua chave API.");
            } finally {
                btn.innerText = "Classificar Email";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
